<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            color: #333;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header h1 {
            font-size: 3.5em;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            background: linear-gradient(to right, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            font-size: 1.3em;
            opacity: 0.95;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease 0.2s backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-value {
            font-size: 2.8em;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: #999;
            font-size: 0.95em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats-details {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e8e8e8;
        }

        .stats-details div {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 0.9em;
            padding: 5px 0;
            transition: all 0.2s ease;
        }

        .stats-details div:hover {
            background: rgba(102, 126, 234, 0.05);
            padding: 5px 10px;
            border-radius: 8px;
            margin: 10px -10px;
        }

        .stats-details .label {
            color: #666;
            font-weight: 500;
        }

        .stats-details .value {
            color: #333;
            font-weight: 600;
        }

        .graphs-section {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            margin-bottom: 50px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            animation: fadeInUp 0.8s ease 0.4s backwards;
        }

        .graphs-section h2 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 700;
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .graphs-section h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        .graph-container {
            margin-bottom: 50px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            background: white;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .graph-container:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            font-size: 1.8em;
            color: white;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            margin: 50px 0;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        footer {
            text-align: center;
            color: white;
            padding: 30px;
            margin-top: 50px;
            opacity: 0.9;
            font-weight: 300;
            letter-spacing: 0.5px;
            animation: fadeInUp 0.8s ease 0.6s backwards;
        }

        footer p {
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.2em;
            }

            header p {
                font-size: 1em;
            }

            .stat-value {
                font-size: 2.2em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .graphs-section {
                padding: 25px;
            }

            .graphs-section h2 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💪 Fitness Tracker Dashboard</h1>
            <p>Track your fitness journey with comprehensive analytics</p>
        </header>

        <div class="loading" id="loading">Loading your fitness data</div>

        <div id="stats-container" style="display: none;">
            <div class="stats-grid" id="stats-grid"></div>
        </div>

        <div id="graphs-container" style="display: none;">
            <div class="graphs-section">
                <h2>📊 Visual Analytics</h2>
                <div id="graphs"></div>
            </div>
        </div>

        <footer>
            <p>Built with ❤️ using Flask & Plotly | © 2025 Fitness Tracker</p>
        </footer>
    </div>

    <script>
        // Fetch and display statistics
        async function loadStatistics() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                const stats = data.statistics;
                const statsGrid = document.getElementById('stats-grid');
                statsGrid.innerHTML = '';

                // Define metrics to display with icons and colors
                const metrics = [
                    { key: 'Steps', icon: '🚶', unit: '', color: '#4CAF50' },
                    { key: 'Calories_Burned', icon: '🔥', unit: 'kcal', color: '#FF5722' },
                    { key: 'Distance_km', icon: '📍', unit: 'km', color: '#2196F3' },
                    { key: 'Active_Minutes', icon: '⏱️', unit: 'min', color: '#9C27B0' },
                    { key: 'Heart_Rate_Avg', icon: '❤️', unit: 'bpm', color: '#E91E63' },
                    { key: 'Sleep_Hours', icon: '😴', unit: 'hrs', color: '#3F51B5' },
                    { key: 'Water_Intake_L', icon: '💧', unit: 'L', color: '#00BCD4' },
                    { key: 'Weight_kg', icon: '⚖️', unit: 'kg', color: '#FF9800' }
                ];

                metrics.forEach(metric => {
                    const stat = stats[metric.key];
                    const card = document.createElement('div');
                    card.className = 'stat-card';
                    card.innerHTML = `
                        <h3>${metric.icon} ${metric.key.replace(/_/g, ' ')}</h3>
                        <div class="stat-value" style="color: ${metric.color};">
                            ${stat.mean} <span style="font-size: 0.5em;">${metric.unit}</span>
                        </div>
                        <div class="stat-label">Average</div>
                        <div class="stats-details">
                            <div>
                                <span class="label">Min:</span>
                                <span class="value">${stat.min} ${metric.unit}</span>
                            </div>
                            <div>
                                <span class="label">Max:</span>
                                <span class="value">${stat.max} ${metric.unit}</span>
                            </div>
                            <div>
                                <span class="label">Median:</span>
                                <span class="value">${stat.median} ${metric.unit}</span>
                            </div>
                            <div>
                                <span class="label">Std Dev:</span>
                                <span class="value">${stat.std} ${metric.unit}</span>
                            </div>
                        </div>
                    `;
                    statsGrid.appendChild(card);
                });

                document.getElementById('stats-container').style.display = 'block';
            } catch (error) {
                console.error('Error loading statistics:', error);
            }
        }

        // Fetch and display graphs
        async function loadGraphs() {
            try {
                const response = await fetch('/api/graphs');
                const data = await response.json();
                
                const graphsContainer = document.getElementById('graphs');
                graphsContainer.innerHTML = '';

                data.graphs.forEach((graph, index) => {
                    const graphDiv = document.createElement('div');
                    graphDiv.className = 'graph-container';
                    graphDiv.id = `graph-${index}`;
                    graphsContainer.appendChild(graphDiv);
                    
                    Plotly.newPlot(`graph-${index}`, graph.data, graph.layout, {
                        responsive: true,
                        displayModeBar: true,
                        modeBarButtonsToRemove: ['lasso2d', 'select2d'],
                        displaylogo: false
                    });
                });

                document.getElementById('graphs-container').style.display = 'block';
            } catch (error) {
                console.error('Error loading graphs:', error);
            }
        }

        // Load all data when page loads
        async function init() {
            await loadStatistics();
            await loadGraphs();
            document.getElementById('loading').style.display = 'none';
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
